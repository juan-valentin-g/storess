<!-- PRODUCTS SECTION -->
<div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 mt-6">

  <div class="flex items-center justify-between mb-6">
    <div>
      <h3 class="text-2xl font-semibold">Products</h3>
      <p class="text-zinc-500 text-sm">
        Manage your store products
      </p>
    </div>

    <button class="px-5 h-11 rounded-2xl bg-violet-600 hover:bg-violet-500 transition font-medium shadow-lg shadow-violet-600/20">
      + Add Product
    </button>
  </div>

  <div class="overflow-x-auto">
    
    <table class="w-full border-collapse">

      <thead>
        <tr class="border-b border-zinc-800 text-zinc-400 text-left">
          <th class="py-4 px-4">Product</th>
          <th class="py-4 px-4">Category</th>
          <th class="py-4 px-4">Price</th>
          <th class="py-4 px-4">Stock</th>
          <th class="py-4 px-4 text-center">Status</th>
          <th class="py-4 px-4 text-center">Actions</th>
        </tr>
      </thead>

      <tbody>

        <!-- Product -->
        <tr class="border-b border-zinc-800 hover:bg-zinc-800/40 transition">
          
          <td class="py-4 px-4">
            <div class="flex items-center gap-4">
              
              <img 
                src="https://via.placeholder.com/60"
                class="w-14 h-14 rounded-2xl object-cover"
              />

              <div>
                <h4 class="font-medium">Laptop Gamer</h4>
                <p class="text-zinc-500 text-sm">ASUS ROG</p>
              </div>

            </div>
          </td>

          <td class="py-4 px-4 text-zinc-300">
            Electronics
          </td>

          <td class="py-4 px-4 font-semibold">
            $24,999
          </td>

          <td class="py-4 px-4">
            12
          </td>

          <td class="py-4 px-4 text-center">
            <span class="px-3 py-1 rounded-full bg-green-500/20 text-green-400 text-sm">
              Available
            </span>
          </td>

          <td class="py-4 px-4">
            <div class="flex justify-center gap-3">
              
              <button class="px-4 py-2 rounded-xl bg-zinc-800 hover:bg-zinc-700 transition text-sm">
                Edit
              </button>

              <button class="px-4 py-2 rounded-xl bg-red-500/20 hover:bg-red-500/30 text-red-400 transition text-sm">
                Delete
              </button>

            </div>
          </td>

        </tr>

        <!-- Product -->
        <tr class="border-b border-zinc-800 hover:bg-zinc-800/40 transition">
          
          <td class="py-4 px-4">
            <div class="flex items-center gap-4">
              
              <img 
                src="https://via.placeholder.com/60"
                class="w-14 h-14 rounded-2xl object-cover"
              />

              <div>
                <h4 class="font-medium">Mechanical Keyboard</h4>
                <p class="text-zinc-500 text-sm">Redragon</p>
              </div>

            </div>
          </td>

          <td class="py-4 px-4 text-zinc-300">
            Accessories
          </td>

          <td class="py-4 px-4 font-semibold">
            $1,499
          </td>

          <td class="py-4 px-4">
            4
          </td>

          <td class="py-4 px-4 text-center">
            <span class="px-3 py-1 rounded-full bg-yellow-500/20 text-yellow-400 text-sm">
              Low Stock
            </span>
          </td>

          <td class="py-4 px-4">
            <div class="flex justify-center gap-3">
              
              <button class="px-4 py-2 rounded-xl bg-zinc-800 hover:bg-zinc-700 transition text-sm">
                Edit
              </button>

              <button class="px-4 py-2 rounded-xl bg-red-500/20 hover:bg-red-500/30 text-red-400 transition text-sm">
                Delete
              </button>

            </div>
          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
